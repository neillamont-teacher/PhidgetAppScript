<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phidget Light Sensor to Google Sheets</title>
    <script src="https://unpkg.com/phidget22@3.x/browser/phidget22.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 30px; line-height: 1.6; background-color: #f4f7f6; color: #333; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { margin-top: 0; color: #2c3e50; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .status-box { margin: 20px 0; padding: 20px; border-radius: 8px; background: #f9f9f9; border: 1px solid #ddd; text-align: center; }
        #sensorLabel { font-size: 32px; font-weight: bold; color: #2980b9; display: block; margin-top: 10px; }
        button { background-color: #3498db; color: white; border: none; padding: 12px 24px; font-size: 16px; border-radius: 6px; cursor: pointer; transition: background 0.3s; width: 100%; }
        button:hover { background-color: #2980b9; }
        button:disabled { background-color: #bdc3c7; cursor: not-allowed; }
        .log-section { margin-top: 20px; padding: 15px; background: #e8f8f5; border-radius: 8px; border-left: 5px solid #27ae60; }
        .footer-note { font-size: 12px; color: #7f8c8d; margin-top: 20px; }
        input[type="checkbox"] { transform: scale(1.2); margin-right: 10px; vertical-align: middle; }
    </style>
</head>
<body>

<div class="container">
    <h2>Phidget Light Logger</h2>

    <div class="status-box">
        <button id="grant-usb-access">1. Connect USB Device</button>
        <div style="margin-top:20px;">
            <label>Current Light Level:</label>
            <span id="sensorLabel">--- lx</span>
        </div>
    </div>

    <div class="log-section">
        <input type="checkbox" id="logCheckbox">
        <label for="logCheckbox"><strong>Enable Logging to Google Sheets</strong></label>
        <p style="margin: 5px 0 0 25px;"><small>Updates Google Sheet every 1 second when active.</small></p>
    </div>

    <p class="footer-note">
        <strong>Troubleshooting:</strong> If the popup doesn't appear, ensure all other Phidget tabs are closed and you are using Chrome or Edge over HTTPS.
    </p>
</div>

<script>
    (function () {
        const illuminanceLabel = document.getElementById("sensorLabel");
        const logCheckbox = document.getElementById("logCheckbox");
        const connectBtn = document.getElementById("grant-usb-access");
        const webAppUrl = "https://script.google.com/macros/s/AKfycbwwfh1OxLKenHxvnIpRwl9zl4OpkUvpafUqnIMKo7FUM4JOENbyORCMmd139L0AioTA/exec";

        // Global connection variable
        let conn = null;

        function sendDataToSheets(lux) {
            fetch(`${webAppUrl}?lux=${lux}`, {
                method: 'GET',
                mode: 'no-cors'
            })
            .then(() => console.log("Success: Sent " + lux + " to Sheets"))
            .catch(err => console.error("Sheet Error:", err));
        }

        async function onIlluminanceChange(illuminance) {
            illuminanceLabel.textContent = illuminance.toFixed(2) + ' lx';
            if (logCheckbox.checked) {
                sendDataToSheets(illuminance.toFixed(2));
            }
        }

        connectBtn.onclick = async () => {
            try {
                // FIX: If a connection object already exists, don't create a new one!
                if (!conn) {
                    conn = new phidget22.USBConnection();
                }

                connectBtn.disabled = true;
                connectBtn.textContent = "Selecting Device...";

                // 1. Request access (The Popup)
                await conn.requestWebUSBDeviceAccess();
                
                connectBtn.textContent = "Connecting...";
                
                // 2. Connect the library
                await conn.connect();

                // 3. Small pause for stability
                await new Promise(res => setTimeout(res, 500));

                const lightSensor = new phidget22.LightSensor();
                lightSensor.onIlluminanceChange = onIlluminanceChange;

                // 4. Open the sensor
                await lightSensor.open(5000);
                lightSensor.setDataInterval(1000);

                connectBtn.textContent = "Connected!";
                connectBtn.style.backgroundColor = "#27ae60";

            } catch (err) {
                connectBtn.disabled = false;
                connectBtn.textContent = "1. Connect USB Device";
                console.error("Phidget Connection Error:", err);
                
                // If it says 'Only one connection active', we need to reset the variable
                if (err.message.includes("Only one")) {
                    alert("The browser is confused. Please REFRESH the page and try again.");
                    conn = null; 
                } else {
                    alert("Error: " + err.message);
                }
            }
        };
    })();
</script>

</body>
</html>
